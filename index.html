<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FlowGaia</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="assets/images/icon-192.png" />
  </head>
  <body
    class="bg-white dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 font-sans antialiased"
  >
    <!-- Theme toggle -->
    <button
      id="theme-toggle"
      class="fixed top-3 right-3 z-50 p-2 rounded-full bg-neutral-100 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 text-sm"
      title="Toggle theme"
    >
      &#9728;
    </button>

    <div id="app" class="flex flex-col h-[100dvh] overflow-hidden">
      <!-- Tab content area (scrollable) -->
      <div
        class="flex-1 overflow-y-auto relative"
        style="padding-bottom: calc(64px + 60px + env(safe-area-inset-bottom, 0px))"
      >
        <!-- Albums Panel -->
        <div id="panel-albums" class="panel p-4">
          <h2 class="text-lg font-semibold mb-4 text-neutral-900 dark:text-neutral-100">Albums</h2>
          <div id="album-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
        </div>

        <!-- Playlist Panel — header injected by playlist.js -->
        <div id="panel-playlist" class="panel hidden">
          <ul id="playlist-list" class="divide-y divide-neutral-100 dark:divide-neutral-800"></ul>
        </div>

        <!-- Queue Panel -->
        <div id="panel-queue" class="panel hidden p-4">
          <h2 class="text-lg font-semibold mb-4 text-neutral-900 dark:text-neutral-100">Queue</h2>
          <p
            id="queue-empty"
            class="text-neutral-400 dark:text-neutral-500 text-sm text-center py-8"
          >
            Queue is empty. Add songs from the Playlist tab.
          </p>
          <ul id="queue-list" class="divide-y divide-neutral-100 dark:divide-neutral-800"></ul>
        </div>

        <!-- Downloaded Panel -->
        <div id="panel-downloaded" class="panel hidden p-4">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-neutral-900 dark:text-neutral-100">Downloaded</h2>
            <button
              id="btn-load-downloaded"
              class="text-sm px-3 py-1.5 bg-neutral-100 dark:bg-neutral-800 rounded-lg text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-700"
            >
              Play All
            </button>
          </div>
          <p id="storage-info" class="text-xs text-neutral-400 dark:text-neutral-500 mb-4"></p>
          <ul id="downloaded-list" class="divide-y divide-neutral-100 dark:divide-neutral-800"></ul>
        </div>
      </div>

      <!-- Mini Player (fixed above tab bar) -->
      <div
        id="mini-player"
        class="hidden fixed left-0 right-0 bg-white dark:bg-neutral-900 border-t border-neutral-100 dark:border-neutral-800 shadow-lg"
        style="bottom: calc(60px + env(safe-area-inset-bottom, 0px)); height: 64px; z-index: 40"
      >
        <!-- Thin progress bar at top edge -->
        <div class="h-0.5 bg-neutral-100 dark:bg-neutral-800">
          <div
            id="mini-progress-bar"
            class="progress-bar h-full bg-neutral-900 dark:bg-neutral-100 w-0 transition-none"
          ></div>
        </div>
        <div class="flex items-center h-[calc(64px-2px)] px-4 gap-3 cursor-pointer">
          <!-- Artwork -->
          <div
            class="w-10 h-10 rounded bg-neutral-100 dark:bg-neutral-800 flex-shrink-0 overflow-hidden"
          >
            <img id="mini-artwork" src="" alt="" class="w-full h-full object-cover hidden" />
            <div
              id="mini-artwork-placeholder"
              class="w-full h-full flex items-center justify-center text-neutral-400"
            >
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"
                />
              </svg>
            </div>
          </div>
          <!-- Track info -->
          <div class="flex-1 min-w-0">
            <div
              id="mini-track-title"
              class="text-sm font-medium truncate text-neutral-900 dark:text-neutral-100"
            >
              Not playing
            </div>
            <div
              id="mini-track-artist"
              class="text-xs text-neutral-500 dark:text-neutral-400 truncate"
            ></div>
          </div>
          <!-- Controls -->
          <div class="flex items-center gap-2">
            <button
              id="mini-prev"
              class="p-2 text-neutral-600 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-neutral-100"
            >
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
              </svg>
            </button>
            <button
              id="mini-play-pause"
              class="p-2 w-9 h-9 flex items-center justify-center rounded-full bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 hover:opacity-90"
            >
              <svg id="mini-play-icon" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
              <svg
                id="mini-pause-icon"
                class="w-4 h-4 hidden"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            </button>
            <button
              id="mini-next"
              class="p-2 text-neutral-600 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-neutral-100"
            >
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Tab Bar -->
      <nav
        id="tab-bar"
        class="fixed bottom-0 left-0 right-0 flex bg-white dark:bg-neutral-900 border-t border-neutral-100 dark:border-neutral-800 safe-area-inset-bottom"
        style="
          height: calc(60px + env(safe-area-inset-bottom, 0px));
          z-index: 50;
          padding-bottom: env(safe-area-inset-bottom, 0px);
        "
      >
        <button
          class="tab active flex-1 flex flex-col items-center justify-center gap-0.5 py-2 text-xs font-medium"
          data-tab="albums"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-5.5c0 1.1.9 2 2 2s2-.9 2-2-.9-2-2-2-2 .9-2 2zm6-8.5c0-2.21-1.79-4-4-4S8 4.29 8 6.5V12h2V6.5c0-1.1.9-2 2-2s2 .9 2 2V12h2V6z"
            />
          </svg>
          Albums
        </button>
        <button
          class="tab flex-1 flex flex-col items-center justify-center gap-0.5 py-2 text-xs font-medium"
          data-tab="playlist"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"
            />
          </svg>
          Playlist
        </button>
        <button
          class="tab flex-1 flex flex-col items-center justify-center gap-0.5 py-2 text-xs font-medium"
          data-tab="queue"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h8v-2H7v2zm0 4h8v-2H7v2zM7 7v2h8V7H7zm6 6h4v-2h-4v2zm0 4h4v-2h-4v2zm0-8v2h4V9h-4zm4-4h2V3h-2v2zm-2 0V3h-2v2h2zm6 0V3h-2v2h2zm-2 16h2v-2h-2v2zm2-4h-2v2h2v-2zm0-4h-2v2h2v-2zm-2-4v2h2V7h-2z"
            />
          </svg>
          Queue
        </button>
        <button
          class="tab flex-1 flex flex-col items-center justify-center gap-0.5 py-2 text-xs font-medium"
          data-tab="downloaded"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"
            />
          </svg>
          Downloaded
        </button>
      </nav>

      <!-- Full Player Overlay -->
      <div
        id="full-player"
        class="hidden fixed inset-0 bg-white dark:bg-neutral-950 flex flex-col"
        style="z-index: 60"
      >
        <!-- Header -->
        <div
          class="flex items-center justify-between px-4 pb-2"
          style="padding-top: max(env(safe-area-inset-top, 0px), 1rem)"
        >
          <button
            id="full-player-close"
            class="p-2 text-neutral-500 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-neutral-100"
          >
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
          </button>
          <div
            id="full-album-name"
            class="text-sm font-medium text-neutral-600 dark:text-neutral-400 truncate px-4"
          ></div>
          <div class="w-10"></div>
          <!-- spacer -->
        </div>

        <!-- Artwork -->
        <div class="flex-1 flex items-center justify-center px-8">
          <div
            id="full-artwork-container"
            class="w-full aspect-square max-w-sm rounded-2xl overflow-hidden bg-neutral-100 dark:bg-neutral-800 shadow-2xl"
          >
            <img id="full-artwork" src="" alt="" class="w-full h-full object-cover hidden" />
            <div
              id="full-artwork-placeholder"
              class="w-full h-full flex items-center justify-center text-neutral-300 dark:text-neutral-600"
            >
              <svg class="w-20 h-20" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"
                />
              </svg>
            </div>
          </div>
        </div>

        <!-- Track info -->
        <div class="px-8 py-4">
          <div
            id="full-track-title"
            class="text-xl font-bold text-neutral-900 dark:text-neutral-100 truncate"
          ></div>
          <div
            id="full-track-artist"
            class="text-sm text-neutral-500 dark:text-neutral-400 truncate mt-1"
          ></div>
        </div>

        <!-- Progress -->
        <div class="px-8 pb-4">
          <div
            id="full-progress-container"
            class="w-full h-1 bg-neutral-100 dark:bg-neutral-800 rounded-full cursor-pointer group"
          >
            <div
              class="progress-bar h-full bg-neutral-900 dark:bg-neutral-100 rounded-full w-0 group-hover:bg-neutral-700 dark:group-hover:bg-neutral-300 transition-colors"
            ></div>
          </div>
          <div class="flex justify-between text-xs text-neutral-400 dark:text-neutral-500 mt-1">
            <span class="time-current">0:00</span>
            <span class="time-total">0:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="px-8 pb-6">
          <!-- Main controls -->
          <div class="flex items-center justify-between mb-6">
            <button
              id="full-shuffle"
              class="p-2 text-neutral-400 dark:text-neutral-500 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
            >
              <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"
                />
              </svg>
            </button>
            <button
              id="full-prev"
              class="p-2 text-neutral-600 dark:text-neutral-300 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
            >
              <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
              </svg>
            </button>
            <button
              id="full-play-pause"
              class="w-16 h-16 rounded-full bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 flex items-center justify-center hover:opacity-90 transition-opacity shadow-lg"
            >
              <svg id="full-play-icon" class="w-8 h-8 ml-1" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
              <svg
                id="full-pause-icon"
                class="w-8 h-8 hidden"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            </button>
            <button
              id="full-next"
              class="p-2 text-neutral-600 dark:text-neutral-300 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
            >
              <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
              </svg>
            </button>
            <button
              id="full-repeat"
              class="p-2 text-neutral-400 dark:text-neutral-500 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
              data-mode="off"
            >
              <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- #app -->

    <script type="module" src="src/app.js"></script>
  </body>
</html>
