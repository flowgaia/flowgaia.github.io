<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowGaia - Sacred Music for the Soul</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/sacred-theme.css">
    <link rel="stylesheet" href="styles/player.css">

    <!-- js-yaml from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <!-- Howler.js for audio playback -->
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="brand">
                <h1 class="site-title" id="site-title">FlowGaia</h1>
                <p class="site-subtitle" id="site-subtitle">Sacred Music for the Soul</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Albums Section -->
            <section class="albums-section">
                <h2 class="section-title">Albums</h2>
                <div id="albums-content" class="albums-grid"></div>
            </section>

            <!-- Songs Section -->
            <section class="songs-section">
                <h2 class="section-title">Songs</h2>
                <div id="songs-content" class="songs-list"></div>
            </section>
        </div>
    </main>

    <!-- Audio Player -->
    <div class="audio-player" id="audio-player">
        <div class="player-container">
            <!-- Now Playing Info -->
            <div class="now-playing">
                <div class="song-artwork">
                    <img id="player-artwork" src="" alt="Song artwork">
                </div>
                <div class="song-info">
                    <div class="song-title" id="player-title">No song playing</div>
                    <div class="song-artist" id="player-artist"></div>
                </div>
            </div>

            <!-- Player Controls -->
            <div class="player-controls">
                <button class="control-btn" id="prev-btn" aria-label="Previous track" title="Previous track">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="control-btn play-pause-btn" id="play-pause-btn" aria-label="Play/Pause" title="Play/Pause">
                    <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
                    </svg>
                </button>
                <button class="control-btn" id="next-btn" aria-label="Next track" title="Next track">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 18h2V6h-2zm-11-7l8.5-6v12z"/>
                    </svg>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="progress-section">
                <span class="time-display" id="current-time">0:00</span>
                <div class="progress-bar">
                    <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1" aria-label="Seek" title="Seek to position">
                </div>
                <span class="time-display" id="duration-time">0:00</span>
            </div>

            <!-- Extra Controls (Speed + Loop) -->
            <div class="controls-extra">
                <!-- Playback Speed Control -->
                <div class="speed-control">
                    <button class="control-btn speed-btn" id="speed-btn" aria-label="Playback speed" title="Playback speed (0.5x - 2x)">
                        <span class="speed-label">1×</span>
                    </button>
                </div>

                <!-- Loop Control -->
                <div class="loop-control">
                    <button class="control-btn loop-btn" id="loop-btn" aria-label="Loop playlist" title="Loop playlist">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Volume Control -->
            <div class="volume-control">
                <button class="control-btn" id="volume-btn" aria-label="Mute/Unmute" title="Mute/Unmute">
                    <svg class="volume-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                    <svg class="mute-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                </button>
                <input type="range" id="volume-slider" min="0" max="100" value="70" aria-label="Volume" title="Volume">
            </div>
        </div>

        <!-- Copyright Info -->
        <div class="copyright-info" id="player-copyright"></div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p id="site-copyright">© 2026 FlowGaia. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts - Load in order: Model, View, Controller, App -->
    <script src="scripts/playback-state.js"></script>
    <script src="scripts/player-view.js"></script>
    <script src="scripts/config-loader.js"></script>
    <script src="scripts/player.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
