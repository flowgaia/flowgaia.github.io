<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg-love" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B4E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4A3269;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:0.3" />
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8D4A0;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg-love)"/>

  <!-- Center glow -->
  <circle cx="400" cy="400" r="300" fill="url(#center-glow)"/>

  <!-- Sacred heart shape -->
  <path d="M400 520 C340 460, 250 440, 250 350 C250 300, 290 260, 350 260 C380 260, 400 275, 400 300 C400 275, 420 260, 450 260 C510 260, 550 300, 550 350 C550 440, 460 460, 400 520 Z"
        fill="none" stroke="#C9A961" stroke-width="3" opacity="0.8"/>

  <!-- Concentric circles -->
  <g opacity="0.4" fill="none" stroke="#C9A961" stroke-width="2">
    <circle cx="400" cy="400" r="150"/>
    <circle cx="400" cy="400" r="200"/>
    <circle cx="400" cy="400" r="250"/>
  </g>

  <!-- Title -->
  <text x="400" y="680" font-family="Cinzel, serif" font-size="52" font-weight="700"
        fill="#C9A961" text-anchor="middle" letter-spacing="3">
    Love What Is
  </text>

  <text x="400" y="730" font-family="Cormorant Garamond, serif" font-size="28"
        fill="#F5F3ED" text-anchor="middle" opacity="0.8">
    Flow Gaia
  </text>
</svg>
