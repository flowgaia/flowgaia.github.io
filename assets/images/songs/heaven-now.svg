<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg-heaven" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A3269;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:0.5" />
    </linearGradient>
    <radialGradient id="light-heaven" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#E8D4A0;stop-opacity:0.8" />
