<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A0F2E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2D1B4E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:0.3" />
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#E8D4A0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background gradient from dark to light -->
  <rect width="800" height="800" fill="url(#bg2)"/>
  
  <!-- Light emanating from above -->
  <ellipse cx="400" cy="150" rx="400" ry="300" fill="url(#light)"/>
  
  <!-- Rising particles/ashes transforming -->
  <g opacity="0.6" fill="#C9A961">
    <circle cx="300" cy="600" r="3"/>
    <circle cx="350" cy="550" r="4"/>
    <circle cx="320" cy="500" r="2"/>
    <circle cx="380" cy="480" r="5"/>
    <circle cx="400" cy="420" r="3"/>
    <circle cx="420" cy="380" r="6"/>
    <circle cx="440" cy="320" r="4"/>
    <circle cx="460" cy="260" r="5"/>
    
    <circle cx="500" cy="580" r="3"/>
    <circle cx="480" cy="530" r="4"/>
    <circle cx="520" cy="490" r="2"/>
    <circle cx="460" cy="450" r="5"/>
    <circle cx="440" cy="400" r="3"/>
    <circle cx="420" cy="350" r="6"/>
    <circle cx="400" cy="280" r="4"/>
    <circle cx="380" cy="220" r="5"/>
  </g>
  
  <!-- Central rising line -->
  <line x1="400" y1="700" x2="400" y2="200" stroke="#C9A961" stroke-width="1" opacity="0.3"/>
  
  <!-- Title -->
  <text x="400" y="680" font-family="Cinzel, serif" font-size="42" font-weight="600"
        fill="#C9A961" text-anchor="middle" letter-spacing="2">
    Ashes into Light
  </text>
  
  <text x="400" y="720" font-family="Cormorant Garamond, serif" font-size="28"
        fill="#F5F3ED" text-anchor="middle" opacity="0.7" font-style="italic">
    Lullaby
  </text>
</svg>
